plugins {
    id 'fabric-loom' version '1.7-SNAPSHOT'
}

version = '1.0.0'
group = 'me.user.omnitiny'

repositories {
    maven { url "https://maven.terraformersmc.com/releases/" } // Для модов на изменение размера
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.1"
    mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
    modImplementation "net.fabricmc:fabric-loader:0.15.11"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21.1"
    
    // Добавляем библиотеку Pehkui — это стандарт для изменения роста персонажа
    modImplementation "com.github.Virtuoel:Pehkui:3.8.0+1.21"
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}
